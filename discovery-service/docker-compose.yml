services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: registry_db
      POSTGRES_USER: registry_user
      POSTGRES_PASSWORD: registry_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - discovery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry_user"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    networks:
      - discovery-network
    healthcheck:
      test: ["CMD-SHELL","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    

  discovery-service:
    image: discovery-service:v2
    ports:
      - "8080:8080"
    environment:
      - REGISTRY_FILE_PATH=/app/data/registry.json
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/registry_db
      - SPRING_DATASOURCE_USERNAME=registry_user
      - SPRING_DATASOURCE_PASSWORD=registry_pass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6349
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - discovery-network

  service-b:
    image: service-b:latest
    ports:
      - "8081:8080"
    environment:
      - APP_NAME=service-b
      - APP_SERVICE_URL=http://service-b:8080
      - DISCOVERY_SERVICE_URL=http://discovery-service:8080
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - discovery-network

  service-a:
    image: service-a:latest
    ports:
      - "8082:8080"
    environment:
      - APP_NAME=service-a
      - APP_SERVICE_URL=http://service-a:8080
      - SERVICE_B_URL=http://service-b:8080
      - DISCOVERY_SERVICE_URL=http://discovery-service:8080
    depends_on:
      discovery-service:
        condition: service_healthy
      service-b:
        condition: service_started
    networks:
      - discovery-network

volumes:
  postgres_data:

networks:
  discovery-network:
    driver: bridge
