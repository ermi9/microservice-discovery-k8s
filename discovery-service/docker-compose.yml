version: '3.8'
services:
  discovery-service:
    image: discovery-service:v2
    ports:
      - "8080:8080"
    networks:
      - discovery-network

  service-b:
    image: service-b:latest
    ports:
      - "8081:8080"
    environment:
      - APP_NAME=service-b
      - APP_SERVICE_URL=http://service-b:8080
      - DISCOVERY_SERVICE_URL=http://discovery-service:8080
    depends_on:
      - discovery-service
    networks:
      - discovery-network

  service-a:
    image: service-a:latest
    ports:
      - "8082:8080"
    environment:
      - APP_NAME=service-a
      - APP_SERVICE_URL=http://service-a:8080
      - SERVICE_B_URL=http://service-b:8080
      - DISCOVERY_SERVICE_URL=http://discovery-service:8080
    depends_on:
      - discovery-service
      - service-b
    networks:
      - discovery-network

networks:
  discovery-network:
    driver: bridge